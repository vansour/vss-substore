name: release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-rc.*"
      - "v*.*.*-beta.*"

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      image_name: ${{ steps.meta.outputs.image_name }}
      image_ref: ${{ steps.meta.outputs.image_ref }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
      is_stable: ${{ steps.meta.outputs.is_stable }}
      tags: ${{ steps.meta.outputs.tags }}
      tag_name: ${{ steps.meta.outputs.tag_name }}

    steps:
      - name: Compute release metadata
        id: meta
        run: |
          set -euo pipefail

          owner="${GITHUB_REPOSITORY_OWNER,,}"
          repo="${GITHUB_REPOSITORY#*/}"
          repo="${repo,,}"
          tag_name="${GITHUB_REF_NAME}"
          image_name="ghcr.io/${owner}/${repo}"
          image_ref="${image_name}:${tag_name}"

          is_prerelease=false
          is_stable=true
          if [[ "${tag_name}" == *-* ]]; then
            is_prerelease=true
            is_stable=false
          fi

          {
            echo "image_name=${image_name}"
            echo "image_ref=${image_ref}"
            echo "is_prerelease=${is_prerelease}"
            echo "is_stable=${is_stable}"
            echo "tag_name=${tag_name}"
            echo "tags<<EOF"
            if [[ "${is_stable}" == "true" ]]; then
              version="${tag_name#v}"
              major="${version%%.*}"
              rest="${version#*.}"
              minor="${rest%%.*}"
              echo "${image_name}:${tag_name}"
              echo "${image_name}:v${major}.${minor}"
              echo "${image_name}:v${major}"
              echo "${image_name}:latest"
            else
              echo "${image_name}:${tag_name}"
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

  verify-tag-source:
    runs-on: ubuntu-latest
    needs:
      - prepare

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag commit is reachable from main
        run: |
          set -euo pipefail
          git fetch origin main --force
          tag_commit="$(git rev-list -n 1 "${GITHUB_REF_NAME}")"

          if ! git branch -r --contains "${tag_commit}" | grep -Eq 'origin/main$'; then
            echo "Tag ${GITHUB_REF_NAME} does not point to a commit on origin/main" >&2
            exit 1
          fi

  verify-release:
    runs-on: ubuntu-latest
    needs:
      - verify-tag-source

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Dioxus CLI
        run: |
          set -euo pipefail
          bin_dir="${CARGO_HOME:-$HOME/.cargo}/bin"
          mkdir -p "${bin_dir}"
          curl -fsSL "https://github.com/DioxusLabs/dioxus/releases/download/v0.7.3/dx-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C "${bin_dir}" dx
          chmod +x "${bin_dir}/dx"
          "${bin_dir}/dx" --version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check workspace
        run: cargo check --workspace

      - name: Check web wasm target
        run: cargo check -p submora-web --target wasm32-unknown-unknown

      - name: Lint workspace
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Lint web wasm target
        run: cargo clippy -p submora-web --target wasm32-unknown-unknown -- -D warnings

      - name: Run tests
        run: cargo test -p submora-core -p submora

      - name: Run browser e2e tests
        run: npm run e2e

  build-and-publish-image:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - verify-release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish release image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ needs.prepare.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.prepare.outputs.tag_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-github-release:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build-and-publish-image

    steps:
      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.prepare.outputs.tag_name }}
          IS_PRERELEASE: ${{ needs.prepare.outputs.is_prerelease }}
        run: |
          set -euo pipefail

          release_args=()
          if [ "${IS_PRERELEASE}" = "true" ]; then
            release_args+=(--prerelease)
          else
            release_args+=(--latest)
          fi

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release edit "${TAG_NAME}" "${release_args[@]}"
          else
            gh release create "${TAG_NAME}" --title "${TAG_NAME}" --generate-notes "${release_args[@]}"
          fi
