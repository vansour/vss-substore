name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check workspace
        run: cargo check --workspace

      - name: Check web wasm target
        run: cargo check -p submora-web --target wasm32-unknown-unknown

      - name: Lint workspace
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Lint web wasm target
        run: cargo clippy -p submora-web --target wasm32-unknown-unknown -- -D warnings

      - name: Run tests
        run: cargo test -p submora-core -p submora

  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Dioxus CLI
        run: |
          set -euo pipefail
          bin_dir="${CARGO_HOME:-$HOME/.cargo}/bin"
          mkdir -p "${bin_dir}"
          curl -fsSL "https://github.com/DioxusLabs/dioxus/releases/download/v0.7.3/dx-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C "${bin_dir}" dx
          chmod +x "${bin_dir}/dx"
          "${bin_dir}/dx" --version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run browser e2e tests
        run: npm run e2e
